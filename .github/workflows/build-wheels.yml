name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["12.6.3"]
        python_version: ["3.10", "3.11", "3.12"]
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu22.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git curl wget python3 python3-pip python3-dev \
            clang clang-format-15 libcairo2-dev libgirepository1.0-dev \
            patchelf sudo
          wget -q https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -O /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel

      - name: Create non-root user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix permissions
        run: chown -R builder:builder .

      - name: Configure Python version for Bazel
        run: |
          PY_TAG="cp$(echo '${{ matrix.python_version }}' | tr -d '.')"
          cat > tools/my_python_version.bzl << BZLEOF
          def get_my_python_version():
              return "${{ matrix.python_version }}"

          def get_my_python_tag():
              return "${PY_TAG}"

          def get_my_system_python_copts():
              copts = [
                  "-DCPP_PYVENV_LAUNCHER=\\\"/usr/bin/python{}\\\"".format(get_my_python_version()),
                  "-DCPP_PYTHON_HOME=\\\"/usr\\\"",
                  "-DCPP_PYTHON_PATH=\\\"/usr/lib/python{}/\\\"".format(get_my_python_version()),
              ]
              return copts
          BZLEOF
          sed -i "s/python_version = \"3\.[0-9]*\"/python_version = \"${{ matrix.python_version }}\"/g" MODULE.bazel
          chown builder:builder tools/my_python_version.bzl MODULE.bazel

      - name: Build wheel
        run: sudo -u builder bazel build //csdecomp/src/pybind/csdecomp:csdecomp_wheel

      - name: Repair wheel with auditwheel
        run: |
          pip3 install auditwheel
          WHEEL=$(find bazel-bin/csdecomp/src/pybind/csdecomp -name "*.whl" | head -1)
          echo "Found wheel: ${WHEEL}"
          auditwheel repair \
            --exclude libcuda.so.1 \
            --plat manylinux_2_28_x86_64 \
            "${WHEEL}" \
            -w dist/
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cuda${{ matrix.cuda_version }}-py${{ matrix.python_version }}
          path: dist/*.whl
