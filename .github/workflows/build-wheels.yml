name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.10", "3.11", "3.12"]
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Install CUDA toolkit
        run: |
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --add-repo \
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          dnf install -y cuda-toolkit-12-6 cuda-cudart-devel-12-6

      - name: Install system dependencies
        run: |
          dnf install -y clang clang-tools-extra wget git patchelf sudo
          wget -q https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -O /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
          # Bazel expects gcc-12/g++-12; manylinux has gcc at /usr/bin/gcc
          ln -sf /usr/bin/gcc /usr/bin/gcc-12
          ln -sf /usr/bin/g++ /usr/bin/g++-12

      - name: Create non-root user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python version and fix permissions
        run: |
          PY_TAG="cp$(echo '${{ matrix.python_version }}' | tr -d '.')"
          cat > tools/my_python_version.bzl << BZLEOF
          def get_my_python_version():
              return "${{ matrix.python_version }}"

          def get_my_python_tag():
              return "${PY_TAG}"

          def get_my_system_python_copts():
              copts = [
                  "-DCPP_PYVENV_LAUNCHER=\\\"/usr/bin/python{}\\\"".format(get_my_python_version()),
                  "-DCPP_PYTHON_HOME=\\\"/usr\\\"",
                  "-DCPP_PYTHON_PATH=\\\"/usr/lib/python{}/\\\"".format(get_my_python_version()),
              ]
              return copts
          BZLEOF
          sed -i "s/python_version = \"3\.[0-9]*\"/python_version = \"${{ matrix.python_version }}\"/g" MODULE.bazel
          chown -R builder:builder .

      - name: Build wheel
        run: |
          sudo -u builder env PATH="/usr/local/cuda-12.6/bin:$PATH" \
            bazel build //csdecomp/src/pybind/csdecomp:csdecomp_wheel

      - name: Repair wheel with auditwheel
        run: |
          pip3 install auditwheel
          WHEEL=$(find bazel-bin/csdecomp/src/pybind/csdecomp -name "*.whl" | head -1)
          echo "Found wheel: ${WHEEL}"
          auditwheel show "${WHEEL}"
          auditwheel repair \
            --exclude libcuda.so.1 \
            --plat manylinux_2_28_x86_64 \
            "${WHEEL}" \
            -w dist/
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.python_version }}
          path: dist/*.whl
